name: Build APK

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
      - '.github/workflows/build-apk.yml'
  pull_request:
    paths:
      - 'mobile/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HAS_RELEASE_KEYSTORE: ${{ secrets.GHOSTTUNNEL_KEYSTORE_BASE64 != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: mobile
        run: npm ci

      - name: Audit dependencies
        working-directory: mobile
        run: npm audit --audit-level=high

      - name: Test config parser
        working-directory: mobile
        run: npm test

      - name: Build web + sync
        working-directory: mobile
        run: |
          npm run build
          npx cap sync android

      - name: Assemble debug APK
        working-directory: mobile/android
        run: chmod +x gradlew && ./gradlew assembleDebug --no-daemon

      - name: Package debug artifact
        run: |
          mkdir -p releases
          cp mobile/android/app/build/outputs/apk/debug/app-debug.apk releases/ghost-tunnel-debug.apk
          sha256sum releases/ghost-tunnel-debug.apk > releases/ghost-tunnel-debug.apk.sha256

      - name: Decode release keystore
        if: env.HAS_RELEASE_KEYSTORE == 'true'
        env:
          GHOSTTUNNEL_KEYSTORE_BASE64: ${{ secrets.GHOSTTUNNEL_KEYSTORE_BASE64 }}
        run: |
          printf '%s' "$GHOSTTUNNEL_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/ghosttunnel-release.jks"

      - name: Assemble signed release APK
        if: env.HAS_RELEASE_KEYSTORE == 'true'
        working-directory: mobile/android
        env:
          GHOSTTUNNEL_KEYSTORE_PATH: ${{ runner.temp }}/ghosttunnel-release.jks
          GHOSTTUNNEL_KEYSTORE_PASSWORD: ${{ secrets.GHOSTTUNNEL_KEYSTORE_PASSWORD }}
          GHOSTTUNNEL_KEY_ALIAS: ${{ secrets.GHOSTTUNNEL_KEY_ALIAS }}
          GHOSTTUNNEL_KEY_PASSWORD: ${{ secrets.GHOSTTUNNEL_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Package release artifact
        if: env.HAS_RELEASE_KEYSTORE == 'true'
        run: |
          cp mobile/android/app/build/outputs/apk/release/app-release.apk releases/ghost-tunnel-release.apk
          sha256sum releases/ghost-tunnel-release.apk > releases/ghost-tunnel-release.apk.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: ghost-tunnel-apk
          path: |
            releases/*.apk
            releases/*.sha256
