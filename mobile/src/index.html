<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#667eea">
  <title>Proxy VPN</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Proxy VPN</h1>
      <p>Conexão segura com um toque</p>
    </header>

    <main>
      <section class="status-card">
        <div class="status-row">
          <span id="statusDot" class="status-dot disconnected"></span>
          <span id="statusText" class="status-label">Desconectado</span>
        </div>
        <button id="toggleBtn" class="btn btn-success btn-large">
          Conectar VPN
        </button>
        <div id="statusMessage" class="status-message"></div>
      </section>

      <section class="config-section">
        <button id="settingsToggle" class="btn btn-secondary settings-toggle" type="button">
          Configuração da VPS
        </button>

        <div id="settingsPanel" class="settings-panel" style="display: none;">
          <form id="configForm">
            <div class="form-group">
              <label for="serverIp">IP da VPS (IPv4)</label>
              <input
                type="text"
                id="serverIp"
                placeholder="ex: 162.243.54.185"
                autocomplete="off"
              >
            </div>

            <div class="form-group">
              <label for="serverPort">Porta WireGuard (UDP)</label>
              <input
                type="number"
                id="serverPort"
                placeholder="51820"
                value="51820"
              >
            </div>

            <div class="form-group">
              <label for="privateKey">Chave privada do cliente</label>
              <textarea
                id="privateKey"
                placeholder="PrivateKey do wg-client.conf"
                rows="3"
              ></textarea>
            </div>

            <div class="form-group">
              <label for="publicKeyServer">Chave pública do servidor</label>
              <textarea
                id="publicKeyServer"
                placeholder="server_public.key"
                rows="3"
              ></textarea>
            </div>

            <button type="button" id="saveBtn" class="btn btn-primary">
              Salvar configuração
            </button>
          </form>
        </div>
      </section>
    </main>

    <footer>
      <p>Cliente WireGuard nativo • Suas chaves ficam só no dispositivo</p>
    </footer>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
